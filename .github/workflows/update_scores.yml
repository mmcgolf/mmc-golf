# MMC Golf - Automatic Score Updater
# Runs every minute during tournament days and pushes updated data.json.
# GitHub Actions free tier gives unlimited minutes on public repos.

name: Update Live Scores

on:
  schedule:
    # Every minute. GitHub minimum is 1 minute. Public repo = free.
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Prevent concurrent runs from racing to push - only one at a time.
# cancel-in-progress: the newest run wins; older in-flight run is cancelled.
concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-requests

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ESPN scores
        run: python scripts/scrape_espn.py

      - name: Build combined data.json
        run: python scripts/build_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "MMC Bot"
          git config user.email "mmc-bot@users.noreply.github.com"
          git add data/scores.json data/data.json data/name_cache.json
          git diff --staged --quiet && exit 0
          git commit -m "Auto-update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Retry push up to 3 times to handle concurrent run collisions
          for attempt in 1 2 3; do
            git pull --rebase -X ours origin main
            git push && break
            echo "Push attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
